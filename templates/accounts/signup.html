<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Smart-Kissan</title>
{% load static %}
<link rel="icon" type="image/png" href="{% static 'core/img/icon.png' %}?v=4">
<link rel="shortcut icon" type="image/png" href="{% static 'core/img/icon.png' %}?v=4">
<link rel="stylesheet" href="{% static 'core/css/main.css' %}">
<script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('sk-theme')||'dark'); })();</script>
<style>
  .login-page {
    min-height: 100vh;
    background: radial-gradient(ellipse at 20% 50%, #1a4429 0%, #0d2b1a 50%, #0a1f12 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    position: relative;
    overflow: hidden;
  }
  .login-page::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: rgba(58,156,87,.08);
    border-radius: 50%;
    top: -150px; left: -150px;
  }
  .login-page::after {
    content: '';
    position: absolute;
    width: 350px; height: 350px;
    background: rgba(58,156,87,.06);
    border-radius: 50%;
    bottom: -80px; right: -80px;
  }
  .login-card {
    background: var(--surface);
    border-radius: 22px;
    padding: 36px 34px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 24px 80px rgba(0,0,0,.55);
    border: 1px solid var(--border);
    position: relative;
    z-index: 1;
    animation: slideUp .4s ease;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 22px;
  }
  .logo-block img {
    width: 90px;
    height: 90px;
    object-fit: contain;
    display: block;
  }
  .logo-block .brand-name {
    margin-top: 10px;
    font-family: 'Georgia', serif;
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
  }
  .logo-block .brand-name .g { color: #4cce7a; }
  .logo-block .brand-name .o { color: rgba(255,255,255,.75); }
  .logo-block .brand-name .k { color: #f5a623; }
  .logo-block .tagline {
    font-size: .68rem;
    color: var(--text3);
    letter-spacing: 1.3px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    font-size: .82rem;
    color: var(--text3);
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="logo-block">
      <img src="{% static 'core/img/logo_circle.png' %}" alt="Smart-Kissan">
      <div class="brand-name">
        <span class="g">Smart</span><span class="o">-</span><span class="k">Kissan</span>
      </div>
      <div class="tagline">Start Your Smart Farming Journey</div>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-error" style="margin-bottom:14px;">❌ {{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control" placeholder="Ravi" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" placeholder="Kumar">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control"
               placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control"
               placeholder="you@example.com">
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control"
                 placeholder="Create password" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm</label>
          <input type="password" name="confirm_password" class="form-control"
                 placeholder="Repeat password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full">
        🌱 Create My Account
      </button>
    </form>

    <div class="divider">Already have an account?</div>

    <a href="{% url 'login' %}" class="btn btn-secondary btn-full" style="text-align:center;">
      🔑 Sign In
    </a>

    <p style="text-align:center;font-size:.74rem;color:var(--text3);margin-top:12px;">
      By creating an account you agree to our terms of service.
    </p>
  </div>
</div>
</body>
</html>
