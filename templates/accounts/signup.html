{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | Smart-Kissan</title>
<link rel="icon" type="image/png" href="{% static 'core/img/icon.png' %}">
<link rel="stylesheet" href="{% static 'core/css/main.css' %}">
<script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('sk-theme')||'dark'); })();</script>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="{% static 'core/img/logo_circle.png' %}" alt="Smart-Kissan" style="width:70px;height:70px;object-fit:contain;">
      <h1 style="margin-top:10px;">Create Account</h1>
      <p>Join Smart-Kissan — free forever</p>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-error">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <!-- Google OAuth button -->
    <a href="/accounts/google/login/?next=/"
       style="display:flex;align-items:center;justify-content:center;gap:10px;
              width:100%;padding:11px 20px;
              border:1.5px solid var(--border);border-radius:10px;
              background:var(--surface2);color:var(--text);
              font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;
              cursor:pointer;text-decoration:none;transition:all .18s;margin-bottom:16px;"
       onmouseover="this.style.borderColor='var(--green-500)';this.style.background='var(--bg3)'"
       onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--surface2)'">
      <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0;">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign up with Google
    </a>

    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div style="flex:1;height:1px;background:var(--border);"></div>
      <span style="color:var(--text3);font-size:.78rem;white-space:nowrap;">or sign up with email</span>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    </div>

    <form method="post">
      {% csrf_token %}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control" placeholder="First name" autocomplete="given-name">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" placeholder="Last name" autocomplete="family-name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Choose a strong password" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat your password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Create Account
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:.85rem;color:var(--text3);">
      Already have an account?
      <a href="{% url 'login' %}" style="color:var(--green-400);font-weight:600;text-decoration:none;">Sign in</a>
    </p>
  </div>
</div>
</body>
</html>
