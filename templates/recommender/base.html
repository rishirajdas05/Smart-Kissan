{% load static i18n %}
<!doctype html>
<html lang="{{ request.LANGUAGE_CODE|default:'en' }}" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>{% block title %}Smart-Kissan{% endblock %}</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/smart-kissan-logo.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/smart-kissan-logo.png' %}">
  <link rel="apple-touch-icon" href="{% static 'img/smart-kissan-logo.png' %}">

  <link rel="stylesheet" href="{% static 'recommender/css/app.css' %}">
  <link rel="stylesheet" href="{% static 'recommender/css/ui.css' %}">
</head>
<body class="sk-body">

  {% include "recommender/navbar.html" %}

  <main class="sk-main">
    <div class="sk-container">
      {% if messages %}
        <div class="sk-toast-wrap">
          {% for message in messages %}
            <div class="sk-toast {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="sk-footer">
    <div class="sk-container">© 2026 Smart-Kissan</div>
  </footer>

  <script src="{% static 'recommender/js/ui.js' %}"></script>
  <script src="{% static 'recommender/js/i18n.js' %}"></script>
</body>
</html>
