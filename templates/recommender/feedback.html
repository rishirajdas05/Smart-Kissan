{% extends "recommender/../recommender/../recommender/../recommender/../recommender/base.html" %}
{% block content %}
<div class="panel">
  <h2>Feedback</h2>

  {% if success %}
    <div style="padding:10px;border-radius:12px;background:rgba(0,255,120,.12);border:1px solid rgba(0,255,120,.22);margin:12px 0;">
      ✅ Thank you! Your feedback has been submitted.
    </div>
  {% endif %}

  {% if error %}
    <div style="padding:10px;border-radius:12px;background:rgba(255,0,0,.12);border:1px solid rgba(255,0,0,.22);margin:12px 0;">
      <b>Error:</b> {{ error }}
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <label>Name (optional)</label>
    <input type="text" name="name" placeholder="Your name">

    <label>Email (optional)</label>
    <input type="email" name="email" placeholder="you@example.com">

    <label>Rating (1-5)</label>
    <select name="rating">
      <option value="">Select</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>

    <label>Message *</label>
    <textarea name="message" rows="5" placeholder="Write your feedback..." required></textarea>

    <button class="btn" type="submit" style="margin-top:12px;">Submit Feedback</button>
  </form>
</div>
{% endblock %}
